name: Price Monitor

on:
  schedule:
    - cron: '*/5 * * * *'     # 5분마다 (public 저장소라 무료 무제한)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: price-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Monitor
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python price_watch.py monitor
      - name: Commit data
        if: always()
        run: |
          git config user.name "price-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A prices.json watch_state.json
          if ! git diff --cached --quiet; then
            git commit -m "data update [skip ci]"
            git pull --rebase --autostash origin main || true
            git push
          else
            echo "no change"
          fi
