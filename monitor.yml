name: Price Monitor

on:
  schedule:
    - cron: '*/30 * * * *'    # 백업: 외부 크론이 멈춰도 30분에 한 번은 돎
  repository_dispatch:
    types: [run-monitor]      # 외부 크론(cron-job.org)이 1분마다 호출 → 실제 실행
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: price-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Monitor
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python3 price_watch.py monitor      # 시스템 python3 사용(stdlib만 써서 설치 불필요 → 더 빠름)
      - name: Commit data
        if: always()
        run: |
          git config user.name "price-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A prices.json watch_state.json
          if ! git diff --cached --quiet; then
            git commit -m "data update [skip ci]"
            git pull --rebase --autostash origin main || true
            git push || (git pull --rebase --autostash origin main && git push)
          else
            echo "no change"
          fi
