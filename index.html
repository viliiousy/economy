<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>내 시세 터미널</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{
    --paper:#F3F3F1;--surface:#FFFFFF;--ink:#14181F;--ink2:#646C78;--ink3:#9AA1AB;
    --line:#E7E8EB;--line2:#DCDEE2;--gold:#A8842A;--up:#E03A4E;--dn:#2563EB;
    --r:14px;--r2:10px;--sh:0 1px 2px rgba(20,24,31,.05);
    --sans:"Pretendard",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .tnum{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
  .wrap{max-width:760px;margin:0 auto}
  header{position:sticky;top:0;z-index:6;background:var(--paper);padding:16px 18px 0}
  .eyebrow{font-size:11px;letter-spacing:.24em;color:var(--ink3);font-weight:700}
  .mast{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;padding:2px 0 12px}
  .mast h1{font-size:25px;font-weight:800;letter-spacing:-.02em;margin:0}
  .mast .right{display:flex;align-items:center;gap:6px}
  .upd{font-size:11px;color:var(--ink3);text-align:right;line-height:1.3;max-width:130px}
  .ico{background:var(--surface);border:1px solid var(--line2);color:var(--ink);width:36px;height:36px;border-radius:10px;font-size:15px;cursor:pointer;flex:none;display:flex;align-items:center;justify-content:center}
  .ico:active{transform:scale(.94)}
  .rule{height:2px;background:linear-gradient(90deg,var(--gold),transparent)}
  nav{position:sticky;top:0;z-index:5;background:var(--paper);display:flex;gap:4px;padding:12px 18px 8px}
  nav button{flex:1;padding:9px 0;border:none;background:transparent;color:var(--ink2);font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;border-radius:9px;position:relative}
  nav button.on{color:var(--ink);background:var(--surface);box-shadow:var(--sh);border:1px solid var(--line)}
  main{padding:6px 18px 96px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);padding:14px 15px;margin-bottom:10px;animation:rise .26s ease both}
  @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .ctop{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
  .nm{font-size:16px;font-weight:700;letter-spacing:-.01em}
  .meta{font-size:11.5px;color:var(--ink3);margin-top:2px}
  .badge{display:inline-block;font-size:10.5px;font-weight:700;color:var(--ink2);background:var(--paper);border:1px solid var(--line2);border-radius:5px;padding:1px 5px;margin-left:6px;vertical-align:middle}
  .pwrap{text-align:right;flex:none}
  .price{font-size:20px;font-weight:700;letter-spacing:-.01em}
  .delta{font-size:12.5px;font-weight:700;margin-top:2px}
  .up{color:var(--up)}.dn{color:var(--dn)}.flat{color:var(--ink3)}
  @keyframes fu{0%{background:rgba(224,58,78,.13)}100%{background:transparent}}
  @keyframes fd{0%{background:rgba(37,99,235,.13)}100%{background:transparent}}
  .fl-up{animation:fu 1s ease}.fl-dn{animation:fd 1s ease}
  .cbot{display:flex;align-items:center;gap:8px;margin-top:12px;padding-top:11px;border-top:1px solid var(--line);flex-wrap:wrap}
  .cbot label{font-size:11.5px;color:var(--ink3);font-weight:600}
  .floor{width:104px;background:var(--paper);border:1px solid var(--line2);color:var(--ink);border-radius:8px;padding:6px 9px;font-size:13px;font-family:var(--sans)}
  .chip-btn{background:var(--paper);border:1px solid var(--line2);color:var(--ink2);border-radius:8px;padding:6px 11px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:var(--sans)}
  .chip-btn:active{transform:scale(.95)}
  .chip-btn.rm{color:#C2384A}
  .dir-dn{color:var(--dn);border-color:#BBD0F5}
  .dir-up{color:var(--up);border-color:#F4C2C8}
  [data-sort]{touch-action:pan-y}
  .card.drag{opacity:.92;box-shadow:0 10px 28px rgba(20,24,31,.18);transform:scale(1.015);touch-action:none;cursor:grabbing}
  .sp{flex:1}
  .sw{position:relative;width:40px;height:23px;flex:none}
  .sw input{position:absolute;opacity:0;width:100%;height:100%;margin:0;cursor:pointer;z-index:2}
  .sw span{position:absolute;inset:0;background:var(--line2);border-radius:12px;transition:.18s}
  .sw span:before{content:"";position:absolute;top:3px;left:3px;width:17px;height:17px;background:#fff;border-radius:50%;transition:.18s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
  .sw input:checked+span{background:var(--gold)}
  .sw input:checked+span:before{transform:translateX(17px)}
  .lists{display:flex;gap:7px;overflow-x:auto;padding:4px 0 12px;-webkit-overflow-scrolling:touch}
  .lists::-webkit-scrollbar{display:none}
  .lchip{flex:none;border:1px solid var(--line2);background:var(--surface);color:var(--ink2);border-radius:20px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
  .lchip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .lchip.add{color:var(--gold);border-style:dashed}
  .lhead{display:flex;align-items:center;gap:8px;margin:2px 0 12px}
  .lhead .t{font-size:17px;font-weight:800;flex:1}
  #search{width:100%;background:var(--surface);border:1px solid var(--line2);color:var(--ink);border-radius:12px;padding:13px 15px;font-size:16px;margin:4px 0 12px;font-family:var(--sans);box-shadow:var(--sh)}
  .res{display:flex;align-items:center;gap:8px;padding:11px 13px;background:var(--surface);border:1px solid var(--line);border-radius:12px;margin-bottom:7px;box-shadow:var(--sh)}
  .res .rn{font-size:14.5px;font-weight:600}.res .rc{font-size:11.5px;color:var(--ink3);margin-top:1px}
  .add{font-size:12.5px;font-weight:700;padding:8px 11px;border-radius:9px;border:1px solid var(--line2);background:var(--paper);color:var(--ink2);cursor:pointer;white-space:nowrap;font-family:var(--sans)}
  .add.star{color:var(--gold);border-color:#E5D9B5;background:#FBF7EA}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  @media(max-width:560px){.grid{grid-template-columns:1fr}}
  .gcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
  .gtop{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;cursor:pointer}
  .gtv{height:150px;border-top:1px solid var(--line)}
  .gtv.miss,.miss{display:flex;align-items:center;justify-content:center;height:150px;color:var(--ink2);font-size:12px}
  .clegend{display:flex;flex-wrap:wrap;gap:10px 16px;margin:10px 4px 4px;font-size:13px;color:var(--ink)}
  .clegend .lgi{display:inline-flex;align-items:center;gap:6px}
  .clegend .lgi i{width:14px;height:3px;border-radius:2px;display:inline-block}
  #mainItems{display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:start}
  @media(max-width:560px){#mainItems{grid-template-columns:1fr}}
  .seg2{display:inline-flex;background:var(--surface);border:1px solid var(--line2);border-radius:9px;padding:3px;margin-bottom:12px}
  .seg2 button{border:none;background:transparent;color:var(--ink2);font-family:var(--sans);font-size:13px;font-weight:600;padding:6px 16px;border-radius:7px;cursor:pointer}
  .seg2.tfbar{display:flex;width:100%;max-width:420px}
  .seg2.tfbar button{flex:1;padding:6px 8px;font-size:12.5px;white-space:nowrap}
  .seg2 button.on{background:var(--ink);color:#fff}
  .combo{height:48vh;min-height:340px;margin-bottom:12px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
  .wsearch{width:100%;background:var(--surface);border:1px solid var(--line2);color:var(--ink);border-radius:11px;padding:11px 13px;font-size:15px;margin:0 0 10px;font-family:var(--sans);box-shadow:var(--sh)}
  .empty{color:var(--ink2);text-align:center;padding:46px 16px;font-size:14px;line-height:1.8}
  .empty .big{font-size:15px;color:var(--ink);font-weight:700;display:block;margin-bottom:4px}
  #setup{padding:22px 20px;max-width:460px;margin:0 auto}
  #setup .eyebrow{margin-bottom:4px}
  #setup h2{font-size:21px;font-weight:800;margin:2px 0 18px;letter-spacing:-.01em}
  #setup label{font-size:12.5px;color:var(--ink2);font-weight:600}
  #setup input{width:100%;background:var(--surface);border:1px solid var(--line2);color:var(--ink);border-radius:10px;padding:11px 13px;font-size:15px;margin:6px 0 13px;font-family:var(--sans)}
  .hint{font-size:12px;color:var(--ink3);line-height:1.7;margin:-5px 0 16px}
  .primary{width:100%;background:var(--ink);color:#fff;border:none;border-radius:11px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--sans)}
  .primary:active{transform:scale(.99)}
  #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--ink);color:#fff;padding:9px 18px;border-radius:22px;font-size:13px;font-weight:600;opacity:0;transition:.25s;z-index:40;pointer-events:none}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .ov{position:fixed;inset:0;background:rgba(20,24,31,.5);z-index:30;display:none;align-items:center;justify-content:center;padding:18px}
  .ov.on{display:flex}
  .sheet{background:var(--surface);border-radius:16px;width:100%;max-width:380px;padding:18px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .sheet h3{font-size:16px;font-weight:800;margin:0 0 14px}
  .sheet input{width:100%;background:var(--paper);border:1px solid var(--line2);border-radius:10px;padding:11px 13px;font-size:15px;font-family:var(--sans);margin-bottom:12px;color:var(--ink)}
  .sheet .opt{display:block;width:100%;text-align:left;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:12px 14px;font-size:14.5px;font-weight:600;margin-bottom:8px;cursor:pointer;font-family:var(--sans);color:var(--ink)}
  .sheet .opt.new{color:var(--gold);border-style:dashed}
  .sheet .rowb{display:flex;gap:8px;margin-top:4px}
  .sheet .rowb button{flex:1;border-radius:10px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--sans);border:1px solid var(--line2);background:var(--paper);color:var(--ink2)}
  .sheet .rowb button.go{background:var(--ink);color:#fff;border-color:var(--ink)}
  #chart{position:fixed;inset:0;background:var(--paper);z-index:35;display:none;flex-direction:column;padding:12px}
  #chart.on{display:flex}
  #chart .bar{display:flex;align-items:center;gap:10px;padding:4px 4px 10px}
  #chart .bar b{flex:1;font-size:17px;font-weight:800}
  #tvbox{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:12px;overflow:hidden}
</style>
</head>
<body>

<div id="setup" style="display:none">
  <div class="eyebrow">MARKET TERMINAL · 처음 설정</div>
  <h2>한 번만 연결하면 끝이에요</h2>
  <label>GitHub 사용자명</label>
  <input id="s-owner" placeholder="viliiousy">
  <label>저장소 이름</label>
  <input id="s-repo" placeholder="economy">
  <label>브랜치</label>
  <input id="s-branch" value="main">
  <label>GitHub 토큰 (Contents 읽기/쓰기)</label>
  <input id="s-token" placeholder="github_pat_...">
  <p class="hint">토큰은 이 브라우저에만 저장돼요. 종목을 추가·삭제하면 자동으로 저장하는 데에만 쓰여요.</p>
  <button class="primary" onclick="saveSetup()">연결하고 시작</button>
</div>

<div id="app" style="display:none">
  <div class="wrap">
    <header>
      <div class="eyebrow">MARKET TERMINAL</div>
      <div class="mast">
        <h1>내 시세</h1>
        <div class="right">
          <div class="upd" id="upd"></div>
          <button class="ico" onclick="refreshPrices()" aria-label="새로고침">⟳</button>
          <button class="ico" onclick="openSettings()" aria-label="설정">⚙</button>
        </div>
      </div>
      <div class="rule"></div>
    </header>
    <nav>
      <button id="t-main" class="on" onclick="tab('main')">메인</button>
      <button id="t-watch" onclick="tab('watch')">관심종목</button>
      <button id="t-charts" onclick="tab('charts')">차트</button>
    </nav>
    <main>
      <div id="tab-main"></div>
      <div id="tab-watch" style="display:none"></div>
      <div id="tab-charts" style="display:none"></div>
    </main>
  </div>
</div>

<div id="toast"></div>
<div class="ov" id="ov"><div class="sheet" id="sheet"></div></div>
<div id="chart">
  <div style="display:flex;flex-direction:column;height:100%;width:100%">
    <div class="bar"><b id="c-name"></b><button class="ico" onclick="closeChart()" aria-label="닫기">✕</button></div>
    <div id="tvbox"></div>
  </div>
</div>

<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<script>
const LS=localStorage;
let GH={owner:LS.getItem('gh_owner'),repo:LS.getItem('gh_repo'),branch:LS.getItem('gh_branch')||'main',token:LS.getItem('gh_token')};
let CONFIG={move_pct:10,favorites:[],watchlists:[]}, SHA=null, PRICES={}, PREV={}, TICKERS=[], TAB='main', activeList=null, chartScope='fav', chartMode='combined', chartTF='d', HIST={items:{}}, HIST_AT=0, saveTimer=null;

const TYPE={kr:'국내',us:'해외',exchange:'환율',metal:'금'};
const unitFor=t=>t==='us'?'$':t==='metal'?'원/g':'원';
const keyOf=it=>it.type+':'+it.code;
const uid=()=>'w'+Date.now().toString(36)+Math.floor(Math.random()*1e3).toString(36);
const b64utf8=s=>btoa(unescape(encodeURIComponent(s)));
const utf8b64=b=>decodeURIComponent(escape(atob(b.replace(/\n/g,''))));
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1500);}

function start(){
  if(!GH.owner||!GH.repo||!GH.token){openSetup();return;}
  document.getElementById('setup').style.display='none';
  document.getElementById('app').style.display='block';
  loadTickers();
  loadConfig().then(()=>{if(CONFIG.watchlists[0])activeList=CONFIG.watchlists[0].id;refreshPrices();render();});
  setInterval(refreshPrices,30000);
}
function openSetup(){
  document.getElementById('app').style.display='none';
  const s=document.getElementById('setup');s.style.display='block';
  for(const[k,id]of[['owner','s-owner'],['repo','s-repo'],['branch','s-branch'],['token','s-token']])if(GH[k])document.getElementById(id).value=GH[k];
}
function saveSetup(){
  GH={owner:val('s-owner'),repo:val('s-repo'),branch:val('s-branch')||'main',token:val('s-token')};
  if(!GH.owner||!GH.repo||!GH.token){alert('사용자명, 저장소, 토큰을 모두 입력하세요.');return;}
  LS.setItem('gh_owner',GH.owner);LS.setItem('gh_repo',GH.repo);LS.setItem('gh_branch',GH.branch);LS.setItem('gh_token',GH.token);
  start();
}
const val=id=>document.getElementById(id).value.trim();

const rawUrl=f=>`https://raw.githubusercontent.com/${GH.owner}/${GH.repo}/${GH.branch}/${f}?t=`+Date.now();
const apiUrl=()=>`https://api.github.com/repos/${GH.owner}/${GH.repo}/contents/config.json`;
const ghH=()=>({'Authorization':'Bearer '+GH.token,'Accept':'application/vnd.github+json'});

async function loadTickers(){try{TICKERS=await(await fetch(rawUrl('tickers.json'))).json();}catch(e){TICKERS=[];}}
async function loadConfig(){
  try{
    const r=await fetch(apiUrl()+'?ref='+GH.branch,{headers:ghH()});
    if(r.status===401){toast('토큰 오류 — 설정 확인');openSetup();return;}
    if(r.status===404){SHA=null;return;}
    const j=await r.json();SHA=j.sha;const c=JSON.parse(utf8b64(j.content));
    if(!c.watchlists){const old=c.watchlist||[];c.watchlists=old.length?[{id:uid(),name:'관심종목',items:old}]:[];}
    CONFIG={move_pct:c.move_pct??10,favorites:c.favorites||[],watchlists:c.watchlists,report_times:c.report_times||(c.report_time?[c.report_time]:['08:00'])};
    if(!CONFIG.report_times.length)CONFIG.report_times=['08:00'];
    CONFIG.market_alerts=Object.assign({kr_open:false,kr_close:false,us_open:false,us_close:false},c.market_alerts||{});
    CONFIG.favorites.forEach(f=>{if(f.alert===undefined)f.alert=true;});
    CONFIG.watchlists.forEach(w=>{if(w.alert===undefined)w.alert=false;});
  }catch(e){toast('설정 불러오기 실패');}
}
async function refreshPrices(){
  try{
    let j=null;
    if(GH.token){   // GitHub API는 커밋 직후 최신본을 줌(raw CDN 5분 캐시 우회)
      const u=`https://api.github.com/repos/${GH.owner}/${GH.repo}/contents/prices.json?ref=${GH.branch}&t=${Date.now()}`;
      const r=await fetch(u,{headers:{'Authorization':'Bearer '+GH.token,'Accept':'application/vnd.github.raw'},cache:'no-store'});
      if(r.ok)j=await r.json();
    }
    if(!j)j=await(await fetch(rawUrl('prices.json'),{cache:'no-store'})).json();
    PREV=PRICES;PRICES=j.items||{};
    document.getElementById('upd').textContent=j.updated?('업데이트 '+j.updated.replace('T',' ').slice(5,16)):'첫 시세 대기 중';
    if(TAB==='charts')return;
    if(document.querySelector('.pwrap[data-pk]'))updatePricesInPlace();
    else render();
  }catch(e){}
}
function queueSave(){clearTimeout(saveTimer);saveTimer=setTimeout(()=>saveConfig(0),700);}
async function fetchSha(){
  try{
    const r=await fetch(apiUrl()+'?ref='+GH.branch,{headers:ghH()});
    if(r.ok)return (await r.json()).sha;
    if(r.status===404)return null;
  }catch(e){}
  return SHA;
}
async function saveConfig(attempt){
  attempt=attempt||0;
  try{
    const body={message:'config update',content:b64utf8(JSON.stringify(CONFIG,null,2)),branch:GH.branch};
    if(SHA)body.sha=SHA;
    const r=await fetch(apiUrl(),{method:'PUT',headers:ghH(),body:JSON.stringify(body)});
    if((r.status===409||r.status===422)&&attempt<4){
      SHA=await fetchSha();            // 내 변경은 그대로 두고 최신 sha만 갱신
      await new Promise(res=>setTimeout(res,250*(attempt+1)));
      return saveConfig(attempt+1);
    }
    if(r.status===401){toast('토큰 오류 — 설정 확인');return;}
    if(!r.ok){toast('저장 실패 ('+r.status+')');return;}
    SHA=(await r.json()).content.sha;toast('저장됨');
  }catch(e){toast('저장 실패');}
}

function fmtPrice(it,p){if(p==null)return '—';if(it.type==='us')return '$'+p.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});if(it.type==='exchange')return p.toLocaleString('ko-KR',{minimumFractionDigits:2,maximumFractionDigits:2})+(it.unit||'원');return Math.round(p).toLocaleString('ko-KR')+(it.unit||'');}
function deltaHtml(pct){if(pct==null)return '<div class="delta flat">—</div>';const c=pct>0?'up':pct<0?'dn':'flat';const a=pct>0?'▲':pct<0?'▼':'–';return `<div class="delta ${c} tnum">${a} ${Math.abs(pct).toFixed(2)}%</div>`;}
function flashClass(it){const k=keyOf(it),a=PRICES[k],b=PREV[k];if(!a||!b||a.price===b.price)return '';return a.price>b.price?'fl-up':'fl-dn';}
function countUp(el,from,to,it,dur){
  dur=dur||800;if(el._raf)cancelAnimationFrame(el._raf);
  const t0=performance.now(),ease=t=>1-Math.pow(1-t,3);
  function frame(now){
    const t=Math.min(1,(now-t0)/dur);
    el.textContent=fmtPrice(it,from+(to-from)*ease(t));
    if(t<1)el._raf=requestAnimationFrame(frame);else{el.textContent=fmtPrice(it,to);el._raf=null;}
  }
  el._raf=requestAnimationFrame(frame);
}
function updatePricesInPlace(){
  document.querySelectorAll('.pwrap[data-pk]').forEach(w=>{
    const k=w.dataset.pk,it={type:w.dataset.ptype,unit:w.dataset.punit};
    const q=PRICES[k]||{},pv=PREV[k]||{};
    const cur=q.price==null?null:q.price,prev=pv.price==null?null:pv.price;
    const pe=w.querySelector('.price');
    if(pe){
      if(cur!=null&&prev!=null&&cur!==prev){
        pe.classList.remove('fl-up','fl-dn');void pe.offsetWidth;
        pe.classList.add(cur>prev?'fl-up':'fl-dn');
        countUp(pe,prev,cur,it);

function enableSort(container,arr,rerender){
  if(!container)return;
  container.querySelectorAll('[data-sort]').forEach(card=>{
    let timer=null,startY=0,dragging=false;
    card.addEventListener('pointerdown',e=>{
      if(e.target.closest('input,button,.sw,a'))return;
      startY=e.clientY;
      timer=setTimeout(()=>begin(e.pointerId),280);
    });
    card.addEventListener('pointermove',e=>{if(!dragging&&Math.abs(e.clientY-startY)>8)clearTimeout(timer);});
    card.addEventListener('pointerup',()=>clearTimeout(timer));
    card.addEventListener('pointercancel',()=>clearTimeout(timer));
    function begin(pid){
      dragging=true;card.classList.add('drag');
      if(navigator.vibrate)try{navigator.vibrate(12);}catch(_){}
      try{card.setPointerCapture(pid);}catch(_){}
      const move=ev=>{ev.preventDefault();const r=getAfter(container,ev.clientX,ev.clientY,card);if(!r.el)container.appendChild(card);else container.insertBefore(card,r.before?r.el:r.el.nextSibling);};
      const up=()=>{
        dragging=false;card.classList.remove('drag');
        document.removeEventListener('pointermove',move);
        const order=[...container.querySelectorAll('[data-sort]')].map(x=>x.dataset.sort);
        arr.sort((a,b)=>order.indexOf(keyOf(a))-order.indexOf(keyOf(b)));
        queueSave();rerender();
      };
      document.addEventListener('pointermove',move,{passive:false});
      document.addEventListener('pointerup',up,{once:true});
    }
  });
}
function getAfter(c,x,y,drag){
  let best=null,bd=Infinity,before=true;
  for(const ch of c.querySelectorAll('[data-sort]')){
    if(ch===drag)continue;
    const b=ch.getBoundingClientRect(),cx=b.left+b.width/2,cy=b.top+b.height/2;
    const d=Math.hypot(x-cx,y-cy);
    if(d<bd){bd=d;best=ch;before=(Math.abs(y-cy)>b.height*0.4)?(y<cy):(x<cx);}
  }
  return {el:best,before};
}

function rank(q){
  q=q.toLowerCase();const o=[];
  for(const e of TICKERS){const n=e.n.toLowerCase(),c=e.c.toLowerCase();let s=-1;
    if(c===q)s=0;else if(n.startsWith(q))s=1;else if(c.startsWith(q))s=2;else if(n.includes(q))s=3;else if(c.includes(q))s=4;
    if(s>=0)o.push([s,e.n.length,e]);}
  o.sort((a,b)=>a[0]-b[0]||a[1]-b[1]);return o.slice(0,40).map(x=>x[2]);
}

      ${mk('us_close','🇺🇸 미국 장 마감 (새벽 05:00경)')}
    </div>
    <p class="hint" style="margin:0 0 12px">켜면 그 시각에 메인 + 알림 켠 리스트 시세를 보내드려요.</p>
    <label style="font-size:12px;color:var(--ink2);font-weight:600">급변동 알림 기준 (%)</label>
    <input id="set-move" type="number" value="${CONFIG.move_pct||10}">
    <div class="rowb"><button onclick="closeOv();openSetup()">GitHub 연결 변경</button><button class="go" onclick="saveSettings()">저장</button></div>`);
}
function saveSettings(){
  const times=[...new Set(SETTIMES.filter(t=>/^\d\d:\d\d$/.test(t)))].sort();
  CONFIG.report_times=times.length?times:['08:00'];
  delete CONFIG.report_time;
  CONFIG.move_pct=parseFloat(val2('set-move'))||10;
  queueSave();closeOv();toast('설정 저장됨');
}
function openSheet(html){document.getElementById('sheet').innerHTML=html;document.getElementById('ov').classList.add('on');}
function closeOv(){document.getElementById('ov').classList.remove('on');}
function askText(title,ph,cb,init){
  openSheet(`<h3>${title}</h3><input id="askin" placeholder="${ph}" value="${init?esc(init):''}"><div class="rowb"><button onclick="closeOv()">취소</button><button class="go" id="askok">확인</button></div>`);
  const i=document.getElementById('askin');i.focus();i.select&&i.select();
  document.getElementById('askok').onclick=()=>{const v=i.value.trim();closeOv();cb(v);};
  i.onkeydown=e=>{if(e.key==='Enter'){const v=i.value.trim();closeOv();cb(v);}};
}
document.getElementById('ov').addEventListener('click',e=>{if(e.target.id==='ov')closeOv();});

async function openChart(it){
  document.getElementById('c-name').textContent=it.name;
  document.getElementById('chart').classList.add('on');
  const box=document.getElementById('tvbox');
  box.innerHTML='<div class="empty">차트 불러오는 중…</div>';
  await loadHistory();
  const ser=serOf(it);
  if(!ser||!ser.length||!window.LightweightCharts){box.innerHTML='<div class="empty">'+(it.type==='metal'?'이 항목은 차트를 지원하지 않아요':'차트 데이터 준비 중이에요 (20분 내 수집)')+'</div>';return;}
  box.innerHTML='';
  const chart=LightweightCharts.createChart(box,Object.assign(baseChartOpts(box.clientHeight||360),{autoSize:true}));
  const s=chart.addCandlestickSeries({upColor:LWUP,downColor:LWDN,borderVisible:false,wickUpColor:LWUP,wickDownColor:LWDN});
  s.setData(candleData(ser));chart.timeScale().fitContent();
}
function closeChart(){document.getElementById('chart').classList.remove('on');document.getElementById('tvbox').innerHTML='';}

start();
</script>
</body>
