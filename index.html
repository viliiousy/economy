<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>내 시세 대시보드</title>
<style>
  :root{--bg:#0e1116;--card:#161b22;--card2:#1c222b;--bd:#2a313c;--tx:#e6edf3;--mut:#8b949e;--up:#ff4d4d;--dn:#3b8bff;--ac:#f0b429}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;font-size:15px}
  header{position:sticky;top:0;z-index:5;background:var(--bg);display:flex;align-items:center;gap:8px;padding:12px 14px;border-bottom:1px solid var(--bd)}
  header h1{font-size:17px;margin:0;font-weight:600;flex:1}
  .ico{background:var(--card);border:1px solid var(--bd);color:var(--tx);width:38px;height:38px;border-radius:10px;font-size:17px;cursor:pointer}
  nav{display:flex;gap:6px;padding:10px 14px;position:sticky;top:63px;background:var(--bg);z-index:4}
  nav button{flex:1;padding:9px 0;border-radius:10px;border:1px solid var(--bd);background:var(--card);color:var(--mut);font-size:14px;font-weight:600;cursor:pointer}
  nav button.on{background:var(--ac);color:#1a1300;border-color:var(--ac)}
  main{padding:6px 14px 90px}
  .card{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:13px 14px;margin-bottom:10px}
  .row{display:flex;align-items:center;gap:10px}
  .nm{font-weight:600;font-size:16px}
  .badge{font-size:11px;color:var(--mut);border:1px solid var(--bd);border-radius:6px;padding:1px 6px;margin-left:6px}
  .price{font-size:20px;font-weight:700;margin-top:2px}
  .chg{font-size:14px;font-weight:600;margin-left:8px}
  .up{color:var(--up)}.dn{color:var(--dn)}.flat{color:var(--mut)}
  .sub{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap}
  .sub label{font-size:12px;color:var(--mut)}
  .floor{width:110px;background:var(--card2);border:1px solid var(--bd);color:var(--tx);border-radius:8px;padding:6px 8px;font-size:13px}
  .mini{background:var(--card2);border:1px solid var(--bd);color:var(--tx);border-radius:8px;padding:6px 10px;font-size:13px;cursor:pointer}
  .mini.rm{color:#ff6b6b}
  .spacer{flex:1}
  .sw{position:relative;width:42px;height:24px;flex:none}
  .sw input{opacity:0;width:100%;height:100%;margin:0;cursor:pointer}
  .sw span{position:absolute;inset:0;background:var(--bd);border-radius:12px;transition:.2s;pointer-events:none}
  .sw span:before{content:"";position:absolute;top:3px;left:3px;width:18px;height:18px;background:#fff;border-radius:50%;transition:.2s}
  .sw input:checked+span{background:var(--ac)}
  .sw input:checked+span:before{transform:translateX(18px)}
  #search{width:100%;background:var(--card);border:1px solid var(--bd);color:var(--tx);border-radius:12px;padding:13px 14px;font-size:16px;margin:6px 0 12px}
  .res{display:flex;align-items:center;gap:8px;padding:11px 12px;border:1px solid var(--bd);background:var(--card);border-radius:12px;margin-bottom:8px}
  .res .nm{font-size:15px}.res .c{font-size:12px;color:var(--mut)}
  .res .add{font-size:13px;padding:7px 10px;border-radius:9px;border:1px solid var(--bd);background:var(--card2);color:var(--tx);cursor:pointer;white-space:nowrap}
  .res .add.star{color:var(--ac)}
  .empty{color:var(--mut);text-align:center;padding:40px 10px;font-size:14px;line-height:1.7}
  #setup{padding:18px 16px}
  #setup h2{font-size:16px}
  #setup input{width:100%;background:var(--card);border:1px solid var(--bd);color:var(--tx);border-radius:10px;padding:11px 12px;font-size:15px;margin:6px 0 12px}
  #setup label{font-size:13px;color:var(--mut)}
  #setup .save{width:100%;background:var(--ac);color:#1a1300;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;cursor:pointer}
  .hint{font-size:12px;color:var(--mut);line-height:1.7;margin:-4px 0 14px}
  #status{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--card2);border:1px solid var(--bd);color:var(--tx);padding:8px 16px;border-radius:20px;font-size:13px;opacity:0;transition:.3s;z-index:20;pointer-events:none}
  #status.show{opacity:1}
  #modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:30;display:none;flex-direction:column;padding:12px}
  #modal.on{display:flex}
  #modal .bar{display:flex;align-items:center;gap:10px;padding:6px 4px 10px}
  #modal .bar b{flex:1;font-size:16px}
  #tvwrap{flex:1;background:var(--card);border-radius:12px;overflow:hidden}
  .updated{font-size:12px;color:var(--mut);text-align:center;padding:2px 0 8px}
</style>
</head>
<body>

<div id="setup" style="display:none">
  <h2>처음 설정 (1회만)</h2>
  <label>GitHub 사용자명 (owner)</label>
  <input id="s-owner" placeholder="예: viliiousy">
  <label>저장소 이름 (repo)</label>
  <input id="s-repo" placeholder="예: economy">
  <label>브랜치</label>
  <input id="s-branch" value="main">
  <label>GitHub 토큰 (fine-grained, Contents 읽기/쓰기)</label>
  <input id="s-token" placeholder="github_pat_...">
  <p class="hint">토큰은 이 브라우저에만 저장되고 외부로 전송되지 않아요(GitHub API 직접 호출에만 사용). 만드는 법은 안내를 따라가면 1분이면 돼요.</p>
  <button class="save" onclick="saveSetup()">저장하고 시작</button>
</div>

<div id="app" style="display:none">
  <header>
    <h1>내 시세 대시보드</h1>
    <button class="ico" onclick="refreshPrices()" title="새로고침">⟳</button>
    <button class="ico" onclick="openSetup()" title="설정">⚙</button>
  </header>
  <nav>
    <button id="t-main" class="on" onclick="tab('main')">메인 ★</button>
    <button id="t-watch" onclick="tab('watch')">관심종목</button>
    <button id="t-search" onclick="tab('search')">검색</button>
  </nav>
  <div class="updated" id="updated"></div>
  <main>
    <div id="tab-main"></div>
    <div id="tab-watch" style="display:none"></div>
    <div id="tab-search" style="display:none">
      <input id="search" placeholder="종목명 또는 티커 검색 (예: 삼성, NVDA)" oninput="doSearch(this.value)">
      <div id="results"></div>
    </div>
  </main>
</div>

<div id="status"></div>

<div id="modal">
  <div class="bar"><b id="m-name"></b><button class="ico" onclick="closeChart()">✕</button></div>
  <div id="tvwrap"></div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
const LS=localStorage;
let GH={owner:LS.getItem('gh_owner'),repo:LS.getItem('gh_repo'),branch:LS.getItem('gh_branch')||'main',token:LS.getItem('gh_token')};
let CONFIG={move_pct:10,favorites:[],watchlist:[]}, SHA=null, PRICES={}, TICKERS=[], TAB='main', saveTimer=null;

function unitFor(t){return t==='us'?'$':t==='metal'?'원/g':'원';}
function keyOf(it){return it.type+':'+it.code;}
function b64utf8(s){return btoa(unescape(encodeURIComponent(s)));}
function utf8b64(b){return decodeURIComponent(escape(atob(b.replace(/\n/g,''))));}
function toast(m){const s=document.getElementById('status');s.textContent=m;s.classList.add('show');clearTimeout(s._t);s._t=setTimeout(()=>s.classList.remove('show'),1600);}

// ---------- 초기화 ----------
function start(){
  if(!GH.owner||!GH.repo||!GH.token){openSetup();return;}
  document.getElementById('setup').style.display='none';
  document.getElementById('app').style.display='block';
  loadTickers(); loadConfig().then(()=>{refreshPrices();render();});
  setInterval(refreshPrices,60000);
}
function openSetup(){
  document.getElementById('app').style.display='none';
  const s=document.getElementById('setup');s.style.display='block';
  if(GH.owner)document.getElementById('s-owner').value=GH.owner;
  if(GH.repo)document.getElementById('s-repo').value=GH.repo;
  if(GH.branch)document.getElementById('s-branch').value=GH.branch;
  if(GH.token)document.getElementById('s-token').value=GH.token;
}
function saveSetup(){
  GH={owner:document.getElementById('s-owner').value.trim(),
      repo:document.getElementById('s-repo').value.trim(),
      branch:(document.getElementById('s-branch').value.trim()||'main'),
      token:document.getElementById('s-token').value.trim()};
  if(!GH.owner||!GH.repo||!GH.token){alert('owner, repo, 토큰을 모두 입력하세요.');return;}
  LS.setItem('gh_owner',GH.owner);LS.setItem('gh_repo',GH.repo);LS.setItem('gh_branch',GH.branch);LS.setItem('gh_token',GH.token);
  start();
}

// ---------- 데이터 로드 ----------
function rawUrl(file){return `https://raw.githubusercontent.com/${GH.owner}/${GH.repo}/${GH.branch}/${file}?t=`+Date.now();}
function apiUrl(){return `https://api.github.com/repos/${GH.owner}/${GH.repo}/contents/config.json`;}
function ghHeaders(){return {'Authorization':'Bearer '+GH.token,'Accept':'application/vnd.github+json'};}

async function loadTickers(){
  try{const r=await fetch(rawUrl('tickers.json'));TICKERS=await r.json();}
  catch(e){TICKERS=[];}
}
async function loadConfig(){
  try{
    const r=await fetch(apiUrl()+'?ref='+GH.branch,{headers:ghHeaders()});
    if(r.status===404){SHA=null;return;}
    if(r.status===401){toast('토큰 오류 — 설정 확인');openSetup();return;}
    const j=await r.json();SHA=j.sha;
    const c=JSON.parse(utf8b64(j.content));
    CONFIG={move_pct:c.move_pct??10,favorites:c.favorites||[],watchlist:c.watchlist||[]};
  }catch(e){toast('설정 불러오기 실패');}
}
async function refreshPrices(){
  try{
    const r=await fetch(rawUrl('prices.json'));const j=await r.json();
    PRICES=j.items||{};
    document.getElementById('updated').textContent=j.updated?('업데이트: '+j.updated.replace('T',' ').slice(0,16)):'아직 시세 기록 없음 (봇 첫 실행 대기)';
    render();
  }catch(e){}
}

// ---------- 저장 ----------
function queueSave(){clearTimeout(saveTimer);saveTimer=setTimeout(saveConfig,800);toast('저장 중…');}
async function saveConfig(retry){
  try{
    const body={message:'config update',content:b64utf8(JSON.stringify(CONFIG,null,2)),branch:GH.branch};
    if(SHA)body.sha=SHA;
    const r=await fetch(apiUrl(),{method:'PUT',headers:ghHeaders(),body:JSON.stringify(body)});
    if(r.status===409&&!retry){await loadConfig();return saveConfig(true);}
    if(!r.ok){toast('저장 실패 ('+r.status+')');return;}
    const j=await r.json();SHA=j.content.sha;toast('저장됨 ✓');
  }catch(e){toast('저장 실패');}
}

// ---------- 표시 ----------
function fmtPrice(it,p){if(p==null)return '—';if(it.type==='us')return '$'+p.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});if(it.type==='exchange')return p.toLocaleString('ko-KR',{minimumFractionDigits:2,maximumFractionDigits:2})+(it.unit||'원');return Math.round(p).toLocaleString('ko-KR')+(it.unit||'');}
function chgHtml(pct){if(pct==null)return '<span class="chg flat">—</span>';const c=pct>0?'up':pct<0?'dn':'flat';const a=pct>0?'🔴 ▲':pct<0?'🔵 ▼':'– ';return `<span class="chg ${c}">${a}${Math.abs(pct).toFixed(2)}%</span>`;}

function card(it,list){
  const q=PRICES[keyOf(it)]||{};
  const badge=({kr:'국내',us:'해외',exchange:'환율',metal:'금'})[it.type]||'';
  let h=`<div class="card"><div class="row"><div style="flex:1"><span class="nm">${it.name}</span><span class="badge">${badge}</span>`;
  h+=`<div class="price">${fmtPrice(it,q.price)}${chgHtml(q.pct)}</div></div></div>`;
  h+=`<div class="sub"><label>알림가</label><input class="floor" type="number" placeholder="없음" value="${it.floor??''}" onchange="setFloor('${list}','${keyOf(it)}',this.value)">`;
  if(list==='watch'){h+=`<label class="sw"><input type="checkbox" ${it.alert?'checked':''} onchange="toggleAlert('${keyOf(it)}',this.checked)"><span></span></label><label>알림</label>`;}
  h+=`<span class="spacer"></span><button class="mini" onclick='openChart(${JSON.stringify(it)})'>📈 차트</button>`;
  h+=`<button class="mini rm" onclick="removeItem('${list}','${keyOf(it)}')">삭제</button></div></div>`;
  return h;
}
function render(){
  if(TAB==='main'){
    const el=document.getElementById('tab-main');
    el.innerHTML=CONFIG.favorites.length?CONFIG.favorites.map(it=>card(it,'fav')).join(''):
      '<div class="empty">즐겨찾기가 비어 있어요.<br>검색 탭에서 ★ 버튼으로 추가하세요.</div>';
  }else if(TAB==='watch'){
    const el=document.getElementById('tab-watch');
    el.innerHTML=CONFIG.watchlist.length?CONFIG.watchlist.map(it=>card(it,'watch')).join(''):
      '<div class="empty">관심종목이 비어 있어요.<br>검색 탭에서 + 버튼으로 담아보세요.<br>알림 스위치를 켜면 알림도 와요.</div>';
  }
}
function tab(t){TAB=t;['main','watch','search'].forEach(x=>{document.getElementById('tab-'+x).style.display=x===t?'block':'none';document.getElementById('t-'+x).classList.toggle('on',x===t);});render();}

// ---------- 검색 ----------
function rank(q){
  q=q.toLowerCase();const out=[];
  for(const e of TICKERS){
    const n=e.n.toLowerCase(),c=e.c.toLowerCase();let s=-1;
    if(c===q)s=0;else if(n.startsWith(q))s=1;else if(c.startsWith(q))s=2;else if(n.includes(q))s=3;else if(c.includes(q))s=4;
    if(s>=0)out.push([s,e.n.length,e]);
  }
  out.sort((a,b)=>a[0]-b[0]||a[1]-b[1]);
  return out.slice(0,40).map(x=>x[2]);
}
function doSearch(v){
  const box=document.getElementById('results');
  v=v.trim();if(v.length<1){box.innerHTML='';return;}
  const list=rank(v);
  if(!list.length){box.innerHTML='<div class="empty">검색 결과가 없어요.</div>';return;}
  box.innerHTML=list.map(e=>{
    const it={name:e.n,code:e.c,type:e.t,tv:e.tv,unit:unitFor(e.t),floor:null};
    const j=JSON.stringify(it).replace(/'/g,"&#39;");
    return `<div class="res"><div style="flex:1"><div class="nm">${e.n}</div><div class="c">${e.c} · ${({kr:'국내',us:'해외',exchange:'환율',metal:'금'})[e.t]||''}</div></div>
      <button class="add star" onclick='addFav(${j})'>★ 즐겨찾기</button>
      <button class="add" onclick='addWatch(${j})'>＋ 관심</button></div>`;
  }).join('');
}
function exists(list,it){return CONFIG[list].some(x=>keyOf(x)===keyOf(it));}
function addFav(it){if(exists('favorites',it)){toast('이미 즐겨찾기에 있어요');return;}CONFIG.favorites.push(it);queueSave();toast('★ 즐겨찾기 추가');render();}
function addWatch(it){if(exists('watchlist',it)){toast('이미 관심종목에 있어요');return;}it.alert=false;CONFIG.watchlist.push(it);queueSave();toast('관심종목 추가');render();}
function removeItem(list,k){const arr=list==='fav'?CONFIG.favorites:CONFIG.watchlist;const i=arr.findIndex(x=>keyOf(x)===k);if(i>=0){arr.splice(i,1);queueSave();render();}}
function setFloor(list,k,v){const arr=list==='fav'?CONFIG.favorites:CONFIG.watchlist;const it=arr.find(x=>keyOf(x)===k);if(it){it.floor=v===''?null:parseFloat(v);queueSave();}}
function toggleAlert(k,on){const it=CONFIG.watchlist.find(x=>keyOf(x)===k);if(it){it.alert=on;queueSave();}}

// ---------- 차트 ----------
function openChart(it){
  document.getElementById('m-name').textContent=it.name+' 차트';
  document.getElementById('modal').classList.add('on');
  document.getElementById('tvwrap').innerHTML='<div id="tvchart" style="height:100%"></div>';
  if(window.TradingView){
    new TradingView.widget({container_id:'tvchart',symbol:it.tv||('KRX:'+it.code),interval:'D',
      theme:'dark',style:'1',locale:'kr',timezone:'Asia/Seoul',autosize:true,withdateranges:true,
      hide_side_toolbar:true,allow_symbol_change:false,
      studies:[]});
  }else{document.getElementById('tvwrap').innerHTML='<div class="empty">차트를 불러오지 못했어요.</div>';}
}
function closeChart(){document.getElementById('modal').classList.remove('on');document.getElementById('tvwrap').innerHTML='';}

start();
</script>
</body>
</html>
