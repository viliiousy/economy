name: Price Monitor

on:
  schedule:
    - cron: '*/30 * * * *'    # 30분마다: 하한가 + 급변동 감시
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: price-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Monitor prices
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          MOVE_PCT: '10'
        run: python price_watch.py monitor
      - name: Persist state
        if: always()
        run: |
          if [ -n "$(git status --porcelain watch_state.json)" ]; then
            git config user.name "price-watch-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add watch_state.json
            git commit -m "update state [skip ci]"
            git push
          else
            echo "변화 없음"
          fi
