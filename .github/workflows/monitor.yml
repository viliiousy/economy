name: Price Monitor

on:
  schedule:
    - cron: '*/30 * * * *'
  repository_dispatch:
    types: [run-monitor]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: price-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Monitor
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python3 price_watch.py monitor
      - name: Commit data
        if: always()
        continue-on-error: true          # 이 단계가 어떤 이유로 실패해도 워크플로우는 성공(빨간 X 방지)
        run: |
          git config user.name "price-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for i in 1 2 3 4 5; do
            git fetch -q origin main || true
            git reset -q --mixed FETCH_HEAD || true      # 방금 받은 원격 끝점 기준으로(추적 ref 문제 회피)
            git add -A prices.json watch_state.json history.json
            if git diff --cached --quiet; then
              echo "변경 없음"; exit 0
            fi
            git commit -q -m "data update [skip ci]"
            if git push -q origin HEAD:main; then
              echo "푸시 완료"; exit 0
            fi
            echo "재시도 $i (원격이 먼저 바뀜)"; sleep 2
          done
          echo "이번엔 못 올림 — 다음 실행에서 재시도"
